name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Setup the Flutter SDK instead of just Dart
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Or your current local version
          channel: 'stable'

      # 2. Use 'flutter' commands instead of 'dart'
      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze

      # 3. Use 'flutter test' (Note: only works if you have a /test folder)
      - name: Run tests
        run: flutter test